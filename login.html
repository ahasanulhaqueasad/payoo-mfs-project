<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo MFS - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* হালকা গ্লাস-মরফিজম ইফেক্ট */
      .glass-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
      }
    </style>
  </head>
  <body class="bg-[#F4F7FA] min-h-screen font-sans">
    <main class="min-h-screen flex items-center justify-center p-4">
      <div
        class="card glass-card w-full max-w-[400px] shadow-[0_20px_50px_rgba(0,0,0,0.1)] border border-white"
      >
        <form class="card-body p-8">
          <div class="flex flex-col items-center mb-8">
            <div
              class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center shadow-lg mb-4 rotate-3 hover:rotate-0 transition-transform duration-300"
            >
              <span class="text-white text-3xl font-black italic">P</span>
            </div>
            <h2 class="text-3xl font-extrabold text-neutral tracking-tight">
              Payoo <span class="text-primary">MFS</span>
            </h2>
            <p
              class="text-xs uppercase tracking-[2px] text-gray-400 mt-1 font-semibold"
            >
              Secure Digital Wallet
            </p>
          </div>

          <div class="form-control w-full">
            <label class="label">
              <span class="label-text font-bold text-gray-600"
                >Account Number</span
              >
            </label>
            <div class="relative">
              <input
                id="input-account-number"
                type="text"
                placeholder="Enter your number"
                class="input input-bordered w-full bg-gray-50 focus:bg-white focus:input-primary transition-all pr-10"
                required
              />
              <span class="absolute right-3 top-3 opacity-30">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-6 w-6"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"
                  />
                </svg>
              </span>
            </div>
          </div>

          <div class="form-control w-full mt-4">
            <div class="flex justify-between items-center px-1">
              <label class="label-text font-bold text-gray-600"
                >Account PIN</label
              >
            </div>
            <div class="relative">
              <input
                id="input-account-pin"
                type="password"
                maxlength="4"
                placeholder="4-digit pin"
                class="input input-bordered w-full bg-gray-50 focus:bg-white focus:input-primary transition-all tracking-[10px] pr-10"
                required
              />
              <span class="absolute right-3 top-3 opacity-30">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-6 w-6"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                  />
                </svg>
              </span>
            </div>
          </div>

          <div class="form-control mt-10">
            <button
              id="btn-login"
              class="btn btn-primary text-white border-none bg-gradient-to-r from-blue-600 to-primary shadow-[0_10px_20px_rgba(37,99,235,0.3)] hover:shadow-none active:scale-95"
            >
              Secure Login
            </button>
          </div>
        </form>
      </div>
    </main>

    <script src="js/login.js"></script>
    <script src="js/sharedStyle.js"></script>
  </body>
</html>
