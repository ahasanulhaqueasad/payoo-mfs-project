<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo MFS - Add Money</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .glass-card {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(12px);
      }
    </style>
  </head>
  <body class="bg-[#F8FAFC] min-h-screen font-sans">
    <main class="min-h-screen flex items-center justify-center p-4">
      <div
        class="card glass-card w-full max-w-[400px] shadow-[0_25px_60px_-15px_rgba(0,0,0,0.1)] border border-white"
      >
        <form class="card-body p-8">
          <div class="flex flex-col items-center mb-6">
            <div
              class="w-14 h-14 bg-primary rounded-2xl flex items-center justify-center shadow-lg mb-3 rotate-3 hover:rotate-0 transition-transform duration-300"
            >
              <span class="text-white text-2xl font-black italic">P</span>
            </div>
            <h2 class="text-2xl font-black text-neutral">
              Payoo <span class="text-primary">MFS</span>
            </h2>
          </div>

          <div
            class="stats shadow-sm bg-gradient-to-br from-blue-700 to-blue-500 text-white mb-8 overflow-hidden relative text-center"
          >
            <div class="stat p-4">
              <div
                class="stat-title text-blue-100 opacity-80 text-xs font-bold uppercase"
              >
                Total Balance
              </div>
              <div id="total-balance" class="stat-value text-2xl">9400</div>
              <div
                class="absolute -right-4 -top-4 w-16 h-16 bg-white/10 rounded-full"
              ></div>
            </div>
          </div>

          <div class="flex w-full gap-2">
            <button class="btn btn-info flex-1">Add Money</button>
            <button class="btn btn-success flex-1">Cash Out</button>
            <button class="btn btn-warning flex-1">Histroy</button>
          </div>

          <!-- add money section start -->
          <div class="">
            <div class="form-control w-full">
              <label class="label">
                <span class="label-text font-bold text-gray-600"
                  >Add Amount</span
                >
              </label>
              <div class="relative">
                <input
                  id="input-add-money"
                  type="number"
                  placeholder="0.00"
                  class="input input-bordered w-full bg-gray-50 focus:bg-white focus:input-primary transition-all pr-12 text-lg font-semibold"
                  required
                />
                <span class="absolute right-4 top-3 font-bold text-gray-400"
                  >TK</span
                >
              </div>
            </div>

            <div class="form-control w-full mt-4">
              <label class="label">
                <span class="label-text font-bold text-gray-600"
                  >Account PIN</span
                >
              </label>
              <div class="relative">
                <input
                  id="input-account-pin"
                  type="password"
                  maxlength="4"
                  placeholder="••••"
                  class="input input-bordered w-full bg-gray-50 focus:bg-white focus:input-primary transition-all tracking-[12px] pr-10"
                  required
                />
                <span class="absolute right-3 top-3 opacity-30">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-6 w-6"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                    />
                  </svg>
                </span>
              </div>
            </div>

            <div class="form-control mt-10">
              <button
                id="btn-login"
                class="btn btn-primary text-white border-none bg-gradient-to-r from-blue-600 to-primary shadow-lg hover:shadow-primary/30 active:scale-95 transition-all py-3 h-auto min-h-0"
              >
                Confirm Add Money
              </button>
            </div>
          </div>
          <!-- add money section end  -->

          <!-- Cashout section start -->
          <div>
            <div class="form-control w-full">
              <label class="label">
                <span class="label-text font-bold text-gray-600"
                  >Cash Out</span
                >
              </label>
              <div class="relative">
                <input
                  id="input-cashout"
                  type="number"
                  placeholder="0.00"
                  class="input input-bordered w-full bg-gray-50 focus:bg-white focus:input-primary transition-all pr-12 text-lg font-semibold"
                  required
                />
                <span class="absolute right-4 top-3 font-bold text-gray-400"
                  >TK</span
                >
              </div>
            </div>

            <div class="form-control w-full mt-4">
              <label class="label">
                <span class="label-text font-bold text-gray-600"
                  >Account PIN</span
                >
              </label>
              <div class="relative">
                <input
                  id="input-cashout-pin"
                  type="password"
                  maxlength="4"
                  placeholder="••••"
                  class="input input-bordered w-full bg-gray-50 focus:bg-white focus:input-primary transition-all tracking-[12px] pr-10"
                  required
                />
                <span class="absolute right-3 top-3 opacity-30">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-6 w-6"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                    />
                  </svg>
                </span>
              </div>
            </div>

            <div class="form-control mt-10">
              <button
                id="cashout-btn"
                class="btn btn-primary text-white border-none bg-gradient-to-r from-blue-600 to-primary shadow-lg hover:shadow-primary/30 active:scale-95 transition-all py-3 h-auto min-h-0"
              >
                Confirm Cash Out
              </button>
            </div>
          </div>
          <!-- Cashout section end  -->
          <a
            href="#"
            class="text-center text-sm mt-6 text-gray-400 hover:text-primary transition-colors font-medium"
          >
            ← Back to Home
          </a>
        </form>
      </div>
    </main>

    <script src="js/features.js"></script>
    <script src="js/addMoney.js"></script>
    <script src="js/cashout.js"></script>
    <script src="js/sharedStyle.js"></script>
  </body>
</html>
